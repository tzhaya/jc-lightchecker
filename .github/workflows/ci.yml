name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: cloudflare-worker/package-lock.json

      - name: Check Python syntax
        run: python -m compileall -q scripts tests

      - name: Run Python tests
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Check browser JavaScript syntax
        run: node --check docs/recent-errors.js && node --check docs/app.js

      - name: Run browser JavaScript tests
        run: npm test

      - name: Install Worker dependencies
        working-directory: cloudflare-worker
        run: npm ci

      - name: Run Worker tests
        working-directory: cloudflare-worker
        run: npm test

      - name: Validate Worker configuration
        working-directory: cloudflare-worker
        run: npx wrangler deploy --dry-run

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Review dependency changes
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4

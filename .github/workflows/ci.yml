name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: cloudflare-worker/package-lock.json

      - name: Check Python syntax
        run: python -m compileall -q scripts tests

      - name: Run Python tests
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Check browser JavaScript syntax
        run: node --check docs/recent-errors.js && node --check docs/app.js

      - name: Run browser JavaScript tests
        run: npm test

      - name: Install Worker dependencies
        working-directory: cloudflare-worker
        run: npm ci

      - name: Run Worker tests
        working-directory: cloudflare-worker
        run: npm test

      - name: Validate Worker configuration
        working-directory: cloudflare-worker
        run: npx wrangler deploy --dry-run

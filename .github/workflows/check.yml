name: JAIRO Cloud Light Check

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: jairo-cloud-light-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run checker
        env:
          HISTORY_RETENTION_DAYS: ${{ vars.HISTORY_RETENTION_DAYS || '14' }}
        run: python scripts/check_jairo.py

      - name: Debug
        run: |
          echo "event=${{ github.event_name }}"
          echo "schedule=${{ github.event.schedule }}"
          date -u

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/latest.json docs/history.jsonl
          git diff --cached --quiet && echo "No result changes to commit." || git commit -m "Update JAIRO Cloud status"
          git push
